<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II Deployment</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:   #080d16;
  --navy2:  #0c1624;
  --navy3:  #101e32;
  --border: rgba(255,255,255,0.08);
  --text:   #dde6f0;
  --muted:  #6a85a0;
  --dim:    #2a4060;
  --orange: #e07c34;
  --sup:    #3dd68c;
  --ana:    #7eb8f7;
  --floor-bg: #f4f6f9;
  --floor-border: #cdd8e3;
}

html, body { height: 100%; font-family: "DM Sans", sans-serif; background: var(--navy); color: var(--text); overflow-x: hidden; }

/* ── NAV BAR ── */
.page-nav {
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 24px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 300;
}
.nav-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.3px;
}


/* ── CONTENT ── */
.content-area {
  padding: 24px 28px;
  background: var(--floor-bg);
  min-height: calc(100vh - 44px);
}

/* ── FLOOR PLAN ── */
.plan-header { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 14px; }
.legend { display: flex; gap: 18px; font-size: 11px; color: #8a9db5; }
.legend-item { display: flex; align-items: center; gap: 6px; }
.ldot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ldot-sup { background: var(--sup); }
.ldot-ana { background: var(--ana); }

.room {
  background: var(--floor-bg);
  border: 2px solid var(--floor-border);
  border-radius: 4px;
  padding: 20px;
}
.ops-floor { display: flex; flex-direction: column; gap: 12px; }
.desk-row-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.aisle { display: none; }

/* SCR single-block layout */
.scr-block {
  background: #fff;
  border: 1px solid var(--floor-border);
  border-radius: 4px;
  overflow: hidden;
}
.scr-block-header {
  background: #e8f0f8;
  border-bottom: 1px solid var(--floor-border);
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 600;
  color: #2a3a54;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.scr-block-count {
  font-size: 11px;
  font-weight: 400;
  color: #7a95a8;
}
.scr-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0;
}
.scr-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid #f0f5fa;
  border-right: 1px solid #f0f5fa;
  cursor: pointer;
  transition: background 0.1s;
}
.scr-row:hover { background: #f4f8fd; }
.scr-info { flex: 1; min-width: 0; }
.scr-name { font-size: 12px; font-weight: 500; color: #1a2a3a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scr-role { font-size: 11px; font-weight: 600; color: #3a5a7a; margin-top: 1px; }
.desk-pod {
  background: #fff; border: 1px solid var(--floor-border); border-radius: 4px;
  overflow: hidden;
  min-width: 0;
}
.desk-top-label {
  background: #e8f0f8; border-bottom: 1px solid var(--floor-border);
  padding: 7px 10px;
  font-size: 12px; font-weight: 600; color: #2a3a54;
  display: flex; align-items: center; justify-content: space-between;
}
.dnum { color: #5a7a9a; font-weight: 600; font-size: 12px; }
.desk-seats { padding: 6px 8px 8px; display: flex; flex-direction: column; gap: 4px; }
.seat-row {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 8px; border-radius: 3px;
  cursor: pointer; transition: background 0.1s;
  border-bottom: 1px solid #f0f5fa;
}
.seat-row:last-child { border-bottom: none; }
.seat-row:hover { background: #eef3f8; }

.seat-info { flex: 1; min-width: 0; }
.seat-name { font-size: 12px; font-weight: 500; color: #1a2a3a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.seat-rl { font-size: 11px; font-weight: 600; color: #3a5a7a; margin-top: 1px; }
.seat-pos { font-family: "DM Mono", monospace; font-size: 10px; color: #b0bfcc; flex-shrink: 0; }

<script>
const PHASES = [
  {id:1, name:"Launch",             x:28.9, y:10.3},
  {id:2, name:"SRB Jettison",      x:36.2, y:10.3},
  {id:3, name:"Core Stage Cutoff", x:39.4, y:9.2},
  {id:4, name:"Perigee Raise",     x:18.6, y:20.3},
  {id:5, name:"Apogee Raise",      x:31.0, y:21.1},
  {id:6, name:"ICPS Separation",   x:34.9, y:25.2},
  {id:7, name:"Upper Stage Sep",   x:51.5, y:21.8},
  {id:8, name:"TLI",               x:86.1, y:28.8},
];

// Room seat counts: { locId: { roomKey: seatCount } }
const ROOM_CONFIG = {
  1: { OCR: 42, SCR: 8 },
  2: { OCR: 36, SCR: 12 },
  3: { OCR: 24, SCR: 8 },
  4: { OCR: 52 },
};

const LOCS = [{id:1,name:"Campus 1"},{id:2,name:"Campus 2"},{id:3,name:"Campus 3"},{id:4,name:"Campus 4"}];

const FIRST=["Alex","Blake","Casey","Dana","Ellis","Finley","Gray","Harper","Indigo","Jordan","Kai","Lane","Morgan","Noel","Oakley","Peyton","Quinn","Reese","Sage","Tatum","Uma","Vale","West","Xen","Yale","Zuri"];
const LAST=["Chen","Rivera","Patel","Kim","Okafor","Torres","Müller","Singh","Walsh","Osei","Nakamura","Reyes","Kovacs","Adeyemi","Fischer","Gupta","Mbeki","Santos","Yamamoto","Olivier","Brennan","Diallo","Park","Eriksson","Oduya","Fernandez"];

// Generate a large enough personnel pool — max 52 seats per room × 8 phases × 4 campuses
// We just need enough unique names per room; we'll generate per room on demand
function generateRoster(count, seed) {
  const out = [];
  for (let i = 0; i < count; i++) {
    out.push({
      personId: seed * 1000 + i,
      fullName: FIRST[(seed + i) % FIRST.length] + " " + LAST[(i * 3 + seed) % LAST.length],
      locationId: seed,
    });
  }
  return out;
}

// Assignments for a specific phase, campus, room — fills exactly seatCount seats
function getAssignments(phId, lId, roomKey) {
  const seatCount = ROOM_CONFIG[lId][roomKey];
  const roster = generateRoster(seatCount, lId * 10 + phId);
  // Rotate roster based on phase
  const shift = (phId - 1) * Math.floor(seatCount / 4);
  const rotated = [...roster.slice(shift % roster.length), ...roster.slice(0, shift % roster.length)];
  let n = 1;
  return rotated.slice(0, seatCount).map(p => ({
    personId: p.personId,
    fullName: p.fullName,
    locationId: p.locationId,
    seatNumber: n,
    deskNumber: Math.ceil(n / 2),
    seatPosition: (n++ % 2 === 1) ? "A" : "B",
  }));
}

function setPage(p){} // no-op, single page now

/* ── ASSIGNMENTS (removed) ── */
function buildAssignNav(){}
function pickAP(){}
function pickAL(){}
function refreshAssign(){}

/* ── MISSION FLOW ── */
let mfP=null, mfL=null;

function buildPhaseDots(){
  const bar=document.getElementById("phase-btn-bar");
  bar.innerHTML=PHASES.map(p=>
    `<button class="phase-btn" id="pb-${p.id}" onclick="mfPickPhase(${p.id})">
      <span class="pb-num">${p.id}</span>
      <span class="pb-name">${p.name}</span>
    </button>`
  ).join("");
}

function mfPickPhase(id){
  mfP=PHASES.find(p=>p.id===id);
  mfL=null;
  // Clear campus selection
  document.querySelectorAll(".campus-pill").forEach(b=>b.classList.remove("active"));
  // Update header
  document.getElementById("mf-phase-name-display").textContent="Phase "+mfP.id+": "+mfP.name;
  // Reset floor and room
  mfRoom = null;
  document.getElementById("room-strip").classList.add("hidden");
  document.getElementById("mf-floor-area").innerHTML=`<div class="mf-floor-empty">Select a campus to view deployment</div>`;
  // Show step 2
  document.getElementById("mf-step-w").classList.add("hidden");
  document.getElementById("mf-step-l").classList.remove("hidden");
}

let mfRoom = null;

function pickMFCampus(id){
  mfL = LOCS.find(l => l.id === id);
  mfRoom = null;
  document.querySelectorAll(".campus-pill").forEach(b => b.classList.remove("active"));
  document.getElementById("cp" + id).classList.add("active");

  // Build room tabs
  const rooms = Object.keys(ROOM_CONFIG[id]);
  const pillsEl = document.getElementById("room-pills");
  pillsEl.innerHTML = rooms.map(r =>
    `<button class="room-pill" id="rp-${r}" onclick="pickMFRoom('${r}')">${r} — ${ROOM_CONFIG[id][r]} seats</button>`
  ).join("");

  document.getElementById("room-strip").classList.remove("hidden");
  document.getElementById("mf-floor-area").innerHTML = `<div class="mf-floor-empty">Select a room above</div>`;

  // Auto-select if only one room (Campus 4)
  if (rooms.length === 1) pickMFRoom(rooms[0]);
}

function pickMFRoom(roomKey){
  mfRoom = roomKey;
  document.querySelectorAll(".room-pill").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("rp-" + roomKey);
  if (btn) btn.classList.add("active");
  const assigns = getAssignments(mfP.id, mfL.id, roomKey);
  document.getElementById("mf-floor-area").innerHTML = renderFloor(assigns, mfP, mfL, roomKey);
}

function mfBack(){
  mfL = null; mfRoom = null;
  document.getElementById("mf-step-w").classList.remove("hidden");
  document.getElementById("mf-step-l").classList.add("hidden");
  document.getElementById("room-strip").classList.add("hidden");
  document.getElementById("mf-floor-area").innerHTML = `<div class="mf-floor-empty">Select a campus to view deployment</div>`;
}

/* ── FLOOR RENDERER ── */
const MC_ROLES = [
  "Flight Director","CAPCOM","Flight Surgeon",
  "GNC","PROP","EECOM","GC","INCO","FDO",
  "RETRO","GUIDO","CONTROL","TELMU","PDRS",
  "MMACS","OSO","TOPO","RIO","FAO",
  "ROBO","EVA","THOR","CHeCS","ADCO",
  "ODIN","MOD"
];

const SCR_SUPPORT_ROLES = [
  "Systems Engineer","Propulsion Analyst","Thermal Control",
  "Power Systems","Software Lead","Comm Specialist",
  "Data Systems","Ops Planner","Integration Lead",
  "Telemetry Analyst","Range Safety","Ground Network",
  "Attitude Control","Entry Monitor","Recovery Coord"
];

function renderFloor(assigns, phase, loc, roomKey) {
  if (roomKey === "SCR") return renderSCR(assigns, phase, loc);
  return renderOCR(assigns, phase, loc);
}

function renderOCR(assigns, phase, loc) {
  const desks = {};
  assigns.forEach(a => { if (!desks[a.deskNumber]) desks[a.deskNumber] = []; desks[a.deskNumber].push(a); });
  const keys = Object.keys(desks).map(Number).sort((a, b) => a - b);
  let rowsHTML = "";
  for (let i = 0; i < keys.length; i += 4) {
    const chunk = keys.slice(i, i + 4);
    let row = `<div class="desk-row-group">`;
    chunk.forEach(dk => {
      const seats = desks[dk].map(s => {
        const role = MC_ROLES[(s.personId - 1) % MC_ROLES.length];
        return `<div class="seat-row" onclick="openModal(${s.personId},${phase.id},${loc.id},${s.seatNumber},${s.deskNumber},'${s.seatPosition}','${role}')">
          <div class="seat-info">
            <div class="seat-name">${s.fullName}</div>
            <div class="seat-rl">${role}</div>
          </div>
          <div class="seat-pos">${s.seatPosition}</div>
        </div>`;
      }).join("");
      const deskRole = MC_ROLES[(dk - 1) % MC_ROLES.length];
      row += `<div class="desk-pod">
        <div class="desk-top-label"><span>${deskRole}</span><span class="dnum">${String(dk).padStart(2,"0")}</span></div>
        <div class="desk-seats">${seats}</div>
      </div>`;
    });
    row += `</div>`;
    rowsHTML += row;
  }
  return `<div class="room"><div class="ops-floor">${rowsHTML}</div></div>`;
}

function renderSCR(assigns, phase, loc) {
  const rows = assigns.map((s, i) => {

/* ═══════════════════════════════════════════════
   EDIT SYSTEM
═══════════════════════════════════════════════ */

const EDIT_PASSWORD = "M2M";
let editMode = false;

// Mutable data stores (cloned from constants so edits don't affect originals)
let DATA = {
  title: "Artemis II Mission Control",
  phases: PHASES.map(p => ({...p})),
  locs: LOCS.map(l => ({...l})),
  roomConfig: JSON.parse(JSON.stringify(ROOM_CONFIG)),
  ocrRoles: [...MC_ROLES],
  scrRoles: [...SCR_SUPPORT_ROLES],
  // Roster: locId -> array of {personId, fullName}
  roster: {},
};

// Build initial roster from generator
function initRoster() {
  for (let lid = 1; lid <= 4; lid++) {
    const maxSeats = Math.max(...Object.values(DATA.roomConfig[lid]));
    const seed = lid * 10;
    const pool = [];
    for (let i = 0; i < maxSeats + 10; i++) {
      pool.push({
        personId: seed * 1000 + i,
        fullName: FIRST[(seed + i) % FIRST.length] + " " + LAST[(i * 3 + seed) % LAST.length],
      });
    }
    DATA.roster[lid] = pool;
  }
}
initRoster();

// Override getAssignments to use DATA
function getAssignments(phId, lId, roomKey) {
  const seatCount = DATA.roomConfig[lId][roomKey];
  const pool = DATA.roster[lId];
  const shift = (phId - 1) * Math.floor(seatCount / 4);
  const rotated = [...pool.slice(shift % pool.length), ...pool.slice(0, shift % pool.length)];
  let n = 1;
  return rotated.slice(0, seatCount).map(p => ({
    personId: p.personId,
    fullName: p.fullName,
    locationId: lId,
    seatNumber: n,
    deskNumber: Math.ceil(n / 2),
    seatPosition: (n++ % 2 === 1) ? "A" : "B",
  }));
}

// Override renderers to use DATA arrays
function renderOCR(assigns, phase, loc) {
  const desks = {};
  assigns.forEach(a => { if (!desks[a.deskNumber]) desks[a.deskNumber] = []; desks[a.deskNumber].push(a); });
  const keys = Object.keys(desks).map(Number).sort((a, b) => a - b);
  let rowsHTML = "";
  for (let i = 0; i < keys.length; i += 4) {
    const chunk = keys.slice(i, i + 4);
    let row = `<div class="desk-row-group">`;
    chunk.forEach(dk => {
      const seats = desks[dk].map(s => {
        const role = DATA.ocrRoles[(s.personId - 1) % DATA.ocrRoles.length];
        return `<div class="seat-row" onclick="openModal(${s.personId},${phase.id},${loc.id},${s.seatNumber},${s.deskNumber},'${s.seatPosition}','${role}')">
          <div class="seat-info">
            <div class="seat-name">${s.fullName}</div>
            <div class="seat-rl">${role}</div>
          </div>
          <div class="seat-pos">${s.seatPosition}</div>
        </div>`;
      }).join("");
      const deskRole = DATA.ocrRoles[(dk - 1) % DATA.ocrRoles.length];
      row += `<div class="desk-pod">
        <div class="desk-top-label"><span>${deskRole}</span><span class="dnum">${String(dk).padStart(2,"0")}</span></div>
        <div class="desk-seats">${seats}</div>
      </div>`;
    });
    row += `</div>`;
    rowsHTML += row;
  }
  return `<div class="room"><div class="ops-floor">${rowsHTML}</div></div>`;
}

function renderSCR(assigns, phase, loc) {
  const rows = assigns.map((s, i) => {
    const role = DATA.scrRoles[i % DATA.scrRoles.length];
    return `<div class="scr-row" onclick="openModal(${s.personId},${phase.id},${loc.id},${s.seatNumber},${s.deskNumber},'${s.seatPosition}','${role}')">
      <div class="scr-info">
        <div class="scr-name">${s.fullName}</div>
        <div class="scr-role">${role}</div>
      </div>
    </div>`;
  }).join("");
  return `<div class="room">
    <div class="scr-block">
      <div class="scr-block-header">
        <span>Support Control Room</span>
        <span class="scr-block-count">${assigns.length} personnel</span>
      </div>
      <div class="scr-list">${rows}</div>
    </div>
  </div>`;
}

/* ── PASSWORD + LOCK/UNLOCK ── */
function promptUnlock() {
  document.getElementById("pw-overlay").classList.add("open");
  document.getElementById("pw-input").value = "";
  document.getElementById("pw-err").textContent = "";
  setTimeout(() => document.getElementById("pw-input").focus(), 100);
}

function submitPassword() {
  const val = document.getElementById("pw-input").value.trim();
  if (val === EDIT_PASSWORD) {
    document.getElementById("pw-overlay").classList.remove("open");
    enableEditMode();
  } else {
    document.getElementById("pw-err").textContent = "Incorrect password.";
    document.getElementById("pw-input").value = "";
    document.getElementById("pw-input").focus();
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("pw-overlay").classList.contains("open")) {
    submitPassword();
  }
  if (e.key === "Escape") {
    document.getElementById("pw-overlay").classList.remove("open");
    closeEditPanel();
  }
});

function enableEditMode() {
  editMode = true;
  document.body.classList.add("edit-mode");
  document.getElementById("unlock-btn").style.display = "none";
  document.getElementById("lock-btn").style.display = "flex";
  document.getElementById("open-edit-btn").style.display = "flex";
}

function lockEdit() {
  editMode = false;
  document.body.classList.remove("edit-mode");
  document.getElementById("unlock-btn").style.display = "flex";
  document.getElementById("lock-btn").style.display = "none";
  document.getElementById("open-edit-btn").style.display = "none";
  closeEditPanel();
}

/* ── EDIT PANEL ── */
let currentEditTab = "general";

function openEditPanel(tab) {
  if (!editMode) return;
  currentEditTab = tab || "general";
  renderEditPanel();
  document.getElementById("edit-overlay").classList.add("open");
}

function closeEditPanel() {
  document.getElementById("edit-overlay").classList.remove("open");
}

function switchEditTab(tab) {
  currentEditTab = tab;
  renderEditPanel();
}

function renderEditPanel() {
  // Render tabs
  const tabs = [
    { id: "general", label: "General" },
    { id: "phases",  label: "Phases" },
    { id: "campuses",label: "Campuses" },
    { id: "rooms",   label: "Rooms & Seats" },
    { id: "roster",  label: "Personnel" },
    { id: "roles",   label: "Role Titles" },
  ];
  document.getElementById("edit-tabs").innerHTML = tabs.map(t =>
    `<button class="edit-tab ${t.id === currentEditTab ? 'active' : ''}" onclick="switchEditTab('${t.id}')">${t.label}</button>`
  ).join("");

  let body = "";

  if (currentEditTab === "general") {
    body = `
      <div class="edit-section-title">Header Title</div>
      <div class="edit-row">
        <span class="edit-label">Title</span>
        <input class="edit-input" id="e-title" value="${escQ(DATA.title)}">
      </div>`;

  } else if (currentEditTab === "phases") {
    body = `<div class="edit-section-title">Phase Names</div>`;
    DATA.phases.forEach((p, i) => {
      body += `<div class="edit-row">
        <span class="edit-label">Phase ${p.id}</span>
        <input class="edit-input" id="e-phase-${i}" value="${escQ(p.name)}">
      </div>`;
    });

  } else if (currentEditTab === "campuses") {
    body = `<div class="edit-section-title">Campus Names</div>`;
    DATA.locs.forEach((l, i) => {
      body += `<div class="edit-row">
        <span class="edit-label">Campus ${l.id}</span>
        <input class="edit-input" id="e-loc-${i}" value="${escQ(l.name)}">
      </div>`;
    });

  } else if (currentEditTab === "rooms") {
    body = `<div class="edit-section-title">Room Names &amp; Seat Counts</div>`;
    DATA.locs.forEach(l => {
      body += `<div class="edit-sub-head">${escH(l.name)}</div>`;
      const rooms = DATA.roomConfig[l.id];
      const roomKeys = Object.keys(rooms);
      roomKeys.forEach(rk => {
        body += `<div class="edit-row">
          <span class="edit-label" style="min-width:80px">Name</span>
          <input class="edit-input" id="e-rname-${l.id}-${rk}" value="${escQ(rk)}" style="max-width:100px">
          <span class="edit-label" style="min-width:50px; text-align:right">Seats</span>
          <input class="edit-input edit-input-num" id="e-rseat-${l.id}-${rk}" type="number" min="1" max="200" value="${rooms[rk]}">
        </div>`;
      });
    });

  } else if (currentEditTab === "roster") {
    body = `<div class="edit-section-title">Personnel Names (one per line)</div>`;
    DATA.locs.forEach(l => {
      const names = DATA.roster[l.id].map(p => p.fullName).join("\n");
      body += `<div class="edit-sub-head">${escH(l.name)}</div>
      <textarea id="e-roster-${l.id}" style="width:100%;font-family:'DM Sans',sans-serif;font-size:12px;border:1px solid #cdd8e3;border-radius:4px;padding:8px 10px;color:#1a2a3a;resize:vertical;min-height:160px;line-height:1.6;" spellcheck="false">${escH(names)}</textarea>`;
    });

  } else if (currentEditTab === "roles") {
    body = `
      <div class="edit-section-title">OCR Position Titles (one per line)</div>
      <textarea id="e-ocr-roles" style="width:100%;font-family:'DM Sans',sans-serif;font-size:12px;border:1px solid #cdd8e3;border-radius:4px;padding:8px 10px;color:#1a2a3a;resize:vertical;min-height:200px;line-height:1.6;" spellcheck="false">${escH(DATA.ocrRoles.join("\n"))}</textarea>
      <div class="edit-section-title" style="margin-top:20px">SCR Support Titles (one per line)</div>
      <textarea id="e-scr-roles" style="width:100%;font-family:'DM Sans',sans-serif;font-size:12px;border:1px solid #cdd8e3;border-radius:4px;padding:8px 10px;color:#1a2a3a;resize:vertical;min-height:160px;line-height:1.6;" spellcheck="false">${escH(DATA.scrRoles.join("\n"))}</textarea>`;
  }

  body += `<button class="edit-save-btn" onclick="saveEdits()">Save Changes</button>`;
  document.getElementById("edit-body").innerHTML = body;
}

function escQ(s) { return String(s).replace(/"/g, "&quot;"); }
function escH(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function saveEdits() {
  if (currentEditTab === "general") {
    DATA.title = document.getElementById("e-title").value.trim() || DATA.title;
    document.getElementById("nav-title").textContent = DATA.title;

  } else if (currentEditTab === "phases") {
    DATA.phases.forEach((p, i) => {
      const val = document.getElementById("e-phase-" + i).value.trim();
      if (val) p.name = val;
    });
    // Rebuild phase buttons
    buildPhaseDots();
    // Update header if a phase is active
    if (mfP) {
      mfP = DATA.phases.find(p => p.id === mfP.id);
      document.getElementById("mf-phase-name-display").textContent = "Phase " + mfP.id + ": " + mfP.name;
    }

  } else if (currentEditTab === "campuses") {
    DATA.locs.forEach((l, i) => {
      const val = document.getElementById("e-loc-" + i).value.trim();
      if (val) l.name = val;
    });
    // Rebuild campus pills
    rebuildCampusPills();

  } else if (currentEditTab === "rooms") {
    const newConfig = {};
    DATA.locs.forEach(l => {
      newConfig[l.id] = {};
      const oldRooms = Object.keys(DATA.roomConfig[l.id]);
      oldRooms.forEach(rk => {
        const nameEl = document.getElementById("e-rname-" + l.id + "-" + rk);
        const seatEl = document.getElementById("e-rseat-" + l.id + "-" + rk);
        const newName = nameEl ? nameEl.value.trim() || rk : rk;
        const newSeats = seatEl ? (parseInt(seatEl.value) || DATA.roomConfig[l.id][rk]) : DATA.roomConfig[l.id][rk];
        newConfig[l.id][newName] = newSeats;
      });
    });
    DATA.roomConfig = newConfig;
    // Rebuild roster pools to accommodate new seat counts
    for (let lid = 1; lid <= 4; lid++) {
      const maxSeats = Math.max(...Object.values(DATA.roomConfig[lid]));
      const needed = maxSeats + 10;
      while (DATA.roster[lid].length < needed) {
        const i = DATA.roster[lid].length;
        const seed = lid * 10;
        DATA.roster[lid].push({
          personId: seed * 1000 + i,
          fullName: FIRST[(seed + i) % FIRST.length] + " " + LAST[(i * 3 + seed) % LAST.length],
        });
      }
    }

  } else if (currentEditTab === "roster") {
    DATA.locs.forEach(l => {
      const raw = document.getElementById("e-roster-" + l.id).value;
      const lines = raw.split("\n").map(s => s.trim()).filter(Boolean);
      DATA.roster[l.id] = lines.map((name, i) => ({
        personId: l.id * 1000 + i,
        fullName: name,
      }));
    });

  } else if (currentEditTab === "roles") {
    const ocrRaw = document.getElementById("e-ocr-roles").value;
    const scrRaw = document.getElementById("e-scr-roles").value;
    const ocrLines = ocrRaw.split("\n").map(s => s.trim()).filter(Boolean);
    const scrLines = scrRaw.split("\n").map(s => s.trim()).filter(Boolean);
    if (ocrLines.length) DATA.ocrRoles = ocrLines;
    if (scrLines.length) DATA.scrRoles = scrLines;
  }

  // Re-render the current floor view if one is visible
  refreshCurrentView();

  // Flash save confirmation
  const btn = document.querySelector(".edit-save-btn");
  btn.textContent = "Saved ✓";
  btn.style.background = "#2a9d6e";
  setTimeout(() => { btn.textContent = "Save Changes"; btn.style.background = ""; }, 1500);
}

function refreshCurrentView() {
  if (mfP && mfL && mfRoom) {
    const assigns = getAssignments(mfP.id, mfL.id, mfRoom);
    document.getElementById("mf-floor-area").innerHTML = renderFloor(assigns, mfP, mfL, mfRoom);
  }
}

function rebuildCampusPills() {
  const strip = document.querySelector(".campus-strip");
  // Remove old pills
  strip.querySelectorAll(".campus-pill").forEach(b => b.remove());
  DATA.locs.forEach(l => {
    const btn = document.createElement("button");
    btn.className = "campus-pill";
    btn.id = "cp" + l.id;
    btn.onclick = () => pickMFCampus(l.id);
    btn.textContent = l.name;
    strip.appendChild(btn);
  });
  // Re-apply active state
  if (mfL) document.getElementById("cp" + mfL.id)?.classList.add("active");
}

// Override buildPhaseDots to use DATA
function buildPhaseDots() {
  const bar = document.getElementById("phase-btn-bar");
  bar.innerHTML = DATA.phases.map(p =>
    `<button class="phase-btn" id="pb-${p.id}" onclick="mfPickPhase(${p.id})">
      <span class="pb-num">${p.id}</span>
      <span class="pb-name">${p.name}</span>
    </button>`
  ).join("");
}

// Override mfPickPhase to use DATA.phases
function mfPickPhase(id) {
  mfP = DATA.phases.find(p => p.id === id);
  mfL = null;
  document.querySelectorAll(".campus-pill").forEach(b => b.classList.remove("active"));
  document.getElementById("mf-phase-name-display").textContent = "Phase " + mfP.id + ": " + mfP.name;
  mfRoom = null;
  document.getElementById("room-strip").classList.add("hidden");
  document.getElementById("mf-floor-area").innerHTML = `<div class="mf-floor-empty">Select a campus to view deployment</div>`;
  document.getElementById("mf-step-w").classList.add("hidden");
  document.getElementById("mf-step-l").classList.remove("hidden");
}

// Override pickMFCampus to use DATA
function pickMFCampus(id) {
  mfL = DATA.locs.find(l => l.id === id);
  mfRoom = null;
  document.querySelectorAll(".campus-pill").forEach(b => b.classList.remove("active"));
  document.getElementById("cp" + id).classList.add("active");
  const rooms = Object.keys(DATA.roomConfig[id]);
  const pillsEl = document.getElementById("room-pills");
  pillsEl.innerHTML = rooms.map(r =>
    `<button class="room-pill" id="rp-${r}" onclick="pickMFRoom('${r}')">${r} — ${DATA.roomConfig[id][r]} seats</button>`
  ).join("");
  document.getElementById("room-strip").classList.remove("hidden");
  document.getElementById("mf-floor-area").innerHTML = `<div class="mf-floor-empty">Select a room above</div>`;
  if (rooms.length === 1) pickMFRoom(rooms[0]);
}

buildPhaseDots();
</script>
